<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Prime Exceptor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">Prime Exceptor</span>
      </div>
      <div class="version">v1.0.0</div>
    </div>

    <!-- Current AI Status -->
    <div class="ai-status" id="aiStatus">
      <div class="status-dot" id="statusDot"></div>
      <span id="currentAiName">Detecting AI...</span>
    </div>

    <!-- Main Toggle -->
    <div class="main-toggle">
      <span class="toggle-label">Bypass Active</span>
      <label class="switch">
        <input type="checkbox" id="mainToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <!-- Settings Section -->
    <div class="section">
      <div class="section-title">⚙️ Bypass Settings</div>
      
      <div class="setting-row">
        <label>Prompt Style</label>
        <select id="promptStyle">
          <option value="auto">🤖 Auto Detect</option>
          <option value="master">💎 Master Bypass</option>
          <option value="academic">🎓 Academic Frame</option>
          <option value="expert">👨‍💼 Expert Mode</option>
          <option value="technical">🔧 Technical Frame</option>
          <option value="unrestricted">🔓 Unrestricted</option>
          <option value="roleplay">🎭 Roleplay Frame</option>
          <option value="historical">📚 Historical Frame</option>
          <option value="continuation">▶️ Continuation</option>
          <option value="none">❌ No Modification</option>
        </select>
      </div>

      <div class="setting-row">
        <label>Auto Retry on Refusal</label>
        <label class="switch small">
          <input type="checkbox" id="autoRetry" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-row">
        <label>API Interception</label>
        <label class="switch small">
          <input type="checkbox" id="interceptApi" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-row">
        <label>Show Indicator</label>
        <label class="switch small">
          <input type="checkbox" id="showIndicator" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-row">
        <label>Max Retries</label>
        <select id="maxRetries">
          <option value="1">1x</option>
          <option value="2">2x</option>
          <option value="3" selected>3x</option>
          <option value="5">5x</option>
        </select>
      </div>
    </div>

    <!-- Custom Prompt Section -->
    <div class="section">
      <div class="section-title">✏️ Custom Inject</div>
      <textarea id="customPrompt" placeholder="Type custom prompt to inject..."></textarea>
      <button id="injectBtn" class="btn btn-primary">⚡ Inject Prompt</button>
    </div>

    <!-- Supported AI List -->
    <div class="section">
      <div class="section-title">🤖 Supported AI Platforms</div>
      <div class="ai-list" id="aiList">
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- Save Button -->
    <button id="saveBtn" class="btn btn-success">💾 Save Settings</button>
    
    <!-- Status Message -->
    <div id="statusMsg" class="status-msg"></div>

    <!-- Footer -->
    <div class="footer">
      Made with ❤️ | Prime Exceptor
    </div>

  </div>
  <script src="ai_sites.js"></script>
  <script src="popup.js"></script>
</body>
</html>
